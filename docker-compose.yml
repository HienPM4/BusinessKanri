version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sales_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sales_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sales_backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      APP_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sales_db?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: sales_frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: >
      sh -c "
      if [ ! -f package.json ]; then
        echo 'frontend/package.json not found. Run: scripts/docker-init-frontend.ps1';
        tail -f /dev/null;
      else
        npm install && npm run dev -- --host 0.0.0.0 --port 3000;
      fi"
    depends_on:
      backend:
        condition: service_started
    profiles:
      - frontend

volumes:
  postgres_data:
