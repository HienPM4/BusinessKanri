name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Verify modules
        run: go mod tidy

      - name: Run tests
        run: go test ./...

      - name: Build API
        run: go build -v ./cmd/api

  migration-check:
    name: DB Migration Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sales_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d sales_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 -U postgres -d sales_db && exit 0
            sleep 2
          done
          echo "PostgreSQL is not ready"
          exit 1
        env:
          PGPASSWORD: postgres

      - name: Apply migrations
        run: |
          for file in backend/migrations/*.sql; do
            echo "Applying $file"
            psql "postgres://postgres:postgres@localhost:5432/sales_db?sslmode=disable" -f "$file"
          done

      - name: Verify critical tables
        run: |
          psql "postgres://postgres:postgres@localhost:5432/sales_db?sslmode=disable" -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('users','products','orders','order_items','payments');"

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('frontend/package.json') != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f frontend/package-lock.json ]; then
            npm ci --prefix frontend
          else
            npm install --prefix frontend
          fi

      - name: Lint
        run: npm run --prefix frontend lint

      - name: Build
        run: npm run --prefix frontend build
